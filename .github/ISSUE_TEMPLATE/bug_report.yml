name: Bug Report
description: Report a problem with the example plugin template
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Clone the template
        2. Run `cmake -B build`
        3. ...
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - Linux
        - Both
    validations:
      required: true
  - type: input
    id: compiler
    attributes:
      label: Compiler
      placeholder: "MSVC 19.38 / Clang 18"
  - type: input
    id: endstone-version
    attributes:
      label: Endstone Version
      placeholder: "0.11"
